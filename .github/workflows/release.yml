name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build Static Binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" \
            -o dist/pixelysia-linux-${{ matrix.goarch }} ./cmd/pixelysia
          chmod +x dist/pixelysia-linux-${{ matrix.goarch }}

      - name: Smoke Test (amd64)
        if: matrix.goarch == 'amd64'
        run: |
          ./dist/pixelysia-linux-amd64 --help > /dev/null

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelysia-linux-${{ matrix.goarch }}
          path: dist/pixelysia-linux-${{ matrix.goarch }}

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download Built Binaries
        uses: actions/download-artifact@v4
        with:
          pattern: pixelysia-linux-*
          merge-multiple: true
          path: dist

      - name: Verify Release Assets
        run: |
          test -f dist/pixelysia-linux-amd64
          test -f dist/pixelysia-linux-arm64
          chmod +x dist/pixelysia-linux-amd64 dist/pixelysia-linux-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pixelysia-linux-amd64
            dist/pixelysia-linux-arm64
          fail_on_unmatched_files: true
